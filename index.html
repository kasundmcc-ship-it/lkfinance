<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LK Finance">
<meta name="theme-color" content="#0f172a">
<title>LK Finance · Collector</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0f172a;--muted:#64748b;--faint:#94a3b8;--border:#e2e8f0;
  --s2:#f8fafc;--s3:#f1f5f9;
  --blue:#1d4ed8;--bluel:#dbeafe;--blued:#1e3a8a;
  --green:#16a34a;--greenl:#dcfce7;--red:#dc2626;--redl:#fee2e2;
  --amber:#d97706;--amberl:#fef3c7;
}
html,body{height:100%;background:#f1f5f9;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.active{display:flex}

/* LOGIN */
#loginScreen{background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%);align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.3)}
.app-icon{width:68px;height:68px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:20px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 20px rgba(29,78,216,.4)}
.login-title{font-size:24px;font-weight:800;text-align:center;letter-spacing:-.5px}
.login-title span{color:var(--blue)}
.login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:28px;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.sel-wrap{position:relative}
.sel-wrap::after{content:"▾";position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sel-wrap select,.field input[type=password]{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none;appearance:none}
.sel-wrap select:focus,.field input[type=password]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}
.btn-signin{width:100%;padding:16px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(29,78,216,.35);margin-top:4px}
.btn-signin:active{transform:scale(.98)}
.err-box{background:var(--redl);color:var(--red);padding:10px 14px;border-radius:10px;font-size:14px;font-weight:500;margin-bottom:14px;display:none}

/* TOPBAR */
.topbar{background:#0f172a;color:#fff;padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.tb-name{font-weight:700;font-size:15px}
.tb-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.sync-pill{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600}
.sp-ok{background:rgba(22,163,74,.25);color:#86efac}
.sp-ing{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.sp-err{background:rgba(220,38,38,.25);color:#fca5a5}

/* CONTENT + NAV */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px}
.bottom-nav{display:flex;background:#fff;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 11px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--faint);gap:3px}
.bn.on{color:var(--blue)}
.bn-ic{font-size:22px;line-height:1}
.bn-lb{font-size:10px;font-weight:600;letter-spacing:.3px}

/* PAGES */
.page{display:none}.page.on{display:block}

/* TODAY BANNER */
.today-banner{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);border-radius:18px;padding:20px;color:#fff;margin-bottom:16px}
.tb-date{font-size:13px;opacity:.65;margin-bottom:12px;font-weight:500}
.tb-stats{display:grid;grid-template-columns:1fr 1fr;gap:0}
.tb-stat .v{font-size:28px;font-weight:800;line-height:1}
.tb-stat .l{font-size:12px;opacity:.65;margin-top:4px;font-weight:500}

/* CARDS */
.card{background:#fff;border-radius:16px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}
.card-hd{padding:14px 16px 0;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.card-bd{padding:16px}

/* CLIENT SELECT */
.cli-select{width:100%;padding:14px 40px 14px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none;appearance:none;font-weight:500}
.cli-select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}
.cli-wrap{position:relative}
.cli-wrap::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:18px}
.client-detail{background:var(--s2);border-radius:12px;padding:14px;margin-top:12px;display:none;border:1px solid var(--border)}
.cd-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.cd-lbl{font-size:13px;color:var(--muted)}
.cd-val{font-size:14px;font-weight:700}
.cd-val.red{color:var(--red)}.cd-val.blue{color:var(--blue)}

/* AMOUNT DISPLAY */
.amt-section{text-align:center;padding:18px 0 14px}
.amt-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.amt-big{font-size:52px;font-weight:800;color:var(--ink);letter-spacing:-3px;line-height:1;display:flex;align-items:flex-start;justify-content:center;gap:6px}
.amt-cur{font-size:18px;font-weight:700;color:var(--muted);margin-top:10px;letter-spacing:0}

/* NUMPAD */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.np{border:2px solid var(--border);border-radius:14px;padding:15px 10px;font-size:24px;font-weight:700;background:#fff;cursor:pointer;font-family:inherit;color:var(--ink);user-select:none;-webkit-user-select:none;transition:.1s;text-align:center}
.np:active{background:var(--s3);border-color:var(--blue);transform:scale(.95)}
.np.act{font-size:16px;background:var(--s2);color:var(--muted);font-weight:600}
.np.act:active{background:var(--border)}

/* NOTE */
.note-inp{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;color:var(--ink);margin-bottom:14px}
.note-inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}

/* COLLECT BTN */
.btn-collect{width:100%;padding:18px;background:var(--green);color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:-.3px;box-shadow:0 4px 14px rgba(22,163,74,.4);transition:.15s}
.btn-collect:active{transform:scale(.97)}
.btn-collect:disabled{opacity:.5;cursor:not-allowed}

/* LOG ITEMS */
.log-total{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lt-v{font-size:26px;font-weight:800;color:var(--green)}
.lt-l{font-size:12px;color:var(--muted);margin-top:2px}
.log-item{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.li-ic{width:44px;height:44px;border-radius:12px;background:var(--greenl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:12px;color:var(--muted);margin-top:2px}
.li-amt{font-size:20px;font-weight:800;color:var(--green);white-space:nowrap}

/* PENDING */
.pend-item{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.05);cursor:pointer}
.pend-item:active{transform:scale(.99);background:var(--s2)}
.pi-l{flex:1;min-width:0}
.pi-name{font-weight:700;font-size:15px}
.pi-inv{font-size:12px;color:var(--muted);margin-top:2px}
.pi-r{text-align:right;margin-left:14px;flex-shrink:0}
.pi-bal{font-size:18px;font-weight:800;color:var(--red)}
.pi-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;margin-top:4px;display:inline-block}
.tag-ov{background:var(--redl);color:var(--red)}
.tag-warn{background:var(--amberl);color:var(--amber)}
.tag-ok{background:var(--greenl);color:var(--green)}
.done-stamp{font-size:11px;color:var(--green);font-weight:700;margin-top:3px}

/* PROFILE */
.prof-banner{background:linear-gradient(135deg,#1e3a8a,#7c3aed);border-radius:18px;padding:24px;color:#fff;text-align:center;margin-bottom:14px}
.prof-av{width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;border:3px solid rgba(255,255,255,.3)}
.prof-name{font-size:23px;font-weight:800}
.prof-role{font-size:13px;opacity:.65;margin-top:4px}
.prof-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.ps-box{background:rgba(255,255,255,.15);border-radius:12px;padding:14px;text-align:center}
.ps-v{font-size:20px;font-weight:800}.ps-l{font-size:11px;opacity:.65;margin-top:3px}
.info-card{background:#fff;border-radius:14px;padding:4px 16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--s3)}
.info-row:last-child{border-bottom:none}
.ir-l{font-size:14px;color:var(--muted)}
.ir-v{font-size:14px;font-weight:700}
.url-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.url-card label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.url-inp{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:10px;font-size:13px;font-family:monospace;color:var(--ink);margin-bottom:10px}
.url-inp:focus{outline:none;border-color:var(--blue)}
.btn-save-url{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-signout{width:100%;padding:15px;background:var(--redl);color:var(--red);border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:#0f172a;color:#fff;padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.g{background:var(--green)}.toast.r{background:var(--red)}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--faint)}
.empty-ic{font-size:52px;margin-bottom:14px}
.empty-t{font-size:16px;font-weight:600;color:var(--muted)}
.empty-s{font-size:13px;margin-top:6px}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    </div>
    <button class="btn-signin" onclick="login()">Sign In →</button>

</div>

<!-- MAIN APP -->
<div class="screen" id="sApp">

        </div>

      <div class="card" id="amtCard" style="display:none">
        <div class="card-bd">

            <div class="amt-big"><span class="amt-cur">LKR</span><span id="amtDisp">0</span></div>
          </div>
          <div class="numpad" id="numpad"></div>
          <input class="note-inp" id="noteIn" placeholder="Note (optional) — e.g. Partial payment">
          <div id="colAlert" style="margin-bottom:10px"></div>
          <button class="btn-collect" id="colBtn" onclick="collect()">✓ Record Collection</button>
        </div>
      </div>
    </div>

    <!-- LOG PAGE -->
    <div class="page" id="pgLog"><div id="logContent"></div></div>

    <!-- PENDING PAGE -->
    <div class="page" id="pgPending"><div id="pendContent"></div></div>

    <!-- PROFILE PAGE -->
    <div class="page" id="pgProfile"><div id="profContent"></div></div>
  </div>

  <nav class="bottom-nav">
    <button class="bn on" id="bn0" onclick="showPage(0)"><span class="bn-ic">💳</span><span class="bn-lb">Collect</span></button>
    <button class="bn"    id="bn1" onclick="showPage(1)"><span class="bn-ic">📋</span><span class="bn-lb">Today</span></button>
    <button class="bn"    id="bn2" onclick="showPage(2)"><span class="bn-ic">⏳</span><span class="bn-lb">Pending</span></button>
    <button class="bn"    id="bn3" onclick="showPage(3)"><span class="bn-ic">👤</span><span class="bn-lb">Me</span></button>
  </nav>
</div>

// ── AUTH ─────────────────────────────────────────
function login(){
  const name=document.getElementById('nameSelect').value;
  const pass=document.getElementById('passIn').value;
  const err=document.getElementById('errBox');
  err.style.display='none';
  if(!name){err.textContent='Please select your name.';err.style.display='block';return}
  if(pass!==PW[name]){err.style.display='block';return}
  me=name;
  loans=JSON.parse(localStorage.getItem('lkf_loans')||'null')||JSON.parse(JSON.stringify(SEED));
  allCols=JSON.parse(localStorage.getItem('lkf_all_cols')||'[]');
  document.getElementById('tbAv').textContent=name[0];
  document.getElementById('tbName').textContent=name;
  document.getElementById('sLogin').classList.remove('active');
  document.getElementById('sApp').classList.add('active');
  buildNumpad();
  syncData().then(()=>{renderAll()});
}

function signOut(){
  me=null;
  document.getElementById('sApp').classList.remove('active');
  document.getElementById('sLogin').classList.add('active');
  document.getElementById('passIn').value='';
  document.getElementById('nameSelect').value='';
}

// ── SYNC ─────────────────────────────────────────
function setSP(st,msg){
  const el=document.getElementById('syncPill');
  el.className='sync-pill '+(st==='ok'?'sp-ok':st==='err'?'sp-err':'sp-ing');
  el.textContent=msg;
}
async function apiFetch(action){
  const url=getUrl(); if(!url)return null;
  try{const r=await fetch(url+'?action='+action);return await r.json()}catch{return null}
}
async function apiPost(action,data){
  const url=getUrl(); if(!url)return null;
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,data})});return await r.json()}catch{return null}
}
async function syncData(){
  if(!getUrl()){setSP('err','⚠ No URL');return}
  setSP('ing','⟳ Syncing');
  const[lr,cr]=await Promise.all([apiFetch('getLoans'),apiFetch('getCollections')]);
  if(lr?.loans?.length){loans=lr.loans;localStorage.setItem('lkf_loans',JSON.stringify(loans))}
  if(cr?.collections){allCols=cr.collections;localStorage.setItem('lkf_all_cols',JSON.stringify(allCols))}
  setSP(getUrl()?'ok':'err', getUrl()?'✓ Live':'⚠ Offline');
}

// ── CLIENT SELECT ─────────────────────────────────
function buildClientSelect(){
  const active=loans.filter(l=>l.status==='Active').sort((a,b)=>String(a.customer).localeCompare(String(b.customer)));
  const sel=document.getElementById('clientSel');
  sel.innerHTML='<option value="">Choose a client...</option>'+
    active.map(l=>`<option value="${l.id}">${l.customer}  ·  Bal: ${fmt(l.balance)}</option>`).join('');
}

function pickClient(){
  const id=parseInt(document.getElementById('clientSel').value);
  const det=document.getElementById('clientDetail');
  const ac=document.getElementById('amtCard');
  if(!id){det.style.display='none';ac.style.display='none';selLoan=null;return}
  selLoan=loans.find(l=>l.id==id);
  if(!selLoan)return;
  document.getElementById('cd-bal').textContent=fmt(selLoan.balance);
  document.getElementById('cd-daily').textContent=fmt(Number(selLoan.totalWithInterest)/60)+'/day';
  document.getElementById('cd-inv').textContent=selLoan.invoice;
  document.getElementById('cd-due').textContent=selLoan.dueDate||'—';
  det.style.display='block';ac.style.display='block';
  amtStr=String(Math.round(Number(selLoan.totalWithInterest)/60));
  updAmt();
  document.getElementById('colAlert').innerHTML='';
}

// ── NUMPAD ────────────────────────────────────────
function buildNumpad(){
  const np=document.getElementById('numpad');
  np.innerHTML=['1','2','3','4','5','6','7','8','9','⌫','0','✓'].map(k=>
    `<button class="np${(k==='⌫'||k==='✓')?' act':''}" onclick="npTap('${k}')">${k}</button>`).join('');
}
function npTap(k){
  if(k==='✓'){collect();return}
  if(k==='⌫'){amtStr=amtStr.length>1?amtStr.slice(0,-1):'0'}
  else{amtStr=amtStr==='0'?k:amtStr+k}
  updAmt();
}
function updAmt(){document.getElementById('amtDisp').textContent=Number(amtStr).toLocaleString()}

// ── COLLECT ───────────────────────────────────────
async function collect(){
  const amt=parseFloat(amtStr);
  const btn=document.getElementById('colBtn');
  if(!selLoan){showToast('Select a client first','r');return}
  if(!amt||amt<=0){showToast('Enter an amount','r');return}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Saving to Google Sheets...';
  const now=new Date(), time=now.toLocaleTimeString('en-LK',{hour:'2-digit',minute:'2-digit'});
  const note=document.getElementById('noteIn').value.trim();
  selLoan.totalPaid=Number(selLoan.totalPaid)+amt;
  selLoan.balance=Math.max(0,Number(selLoan.balance)-amt);
  selLoan.paidDays=Math.min(60,Math.floor(Number(selLoan.totalPaid)/(Number(selLoan.totalWithInterest)/60)));
  if(selLoan.balance<=0){selLoan.status='Closed';selLoan.balance=0}
  const col={id:Date.now(),date:tod(),time,collector:me,loanId:selLoan.id,
    customer:selLoan.customer,invoice:selLoan.invoice,amount:amt,note,balance:selLoan.balance};
  allCols.push(col);saveLocal();
  setSP('ing','⟳ Saving');
  const[r1,r2]=await Promise.all([apiPost('addCollection',col),apiPost('updateLoan',selLoan)]);
  const ok=r1&&r1.ok;
  setSP(ok?'ok':'err',ok?'✓ Saved':'⚠ Offline');
  showToast(ok?'✓ Saved to Google Sheets!':'✓ Saved locally (offline)','g');
  document.getElementById('clientSel').value='';
  document.getElementById('clientDetail').style.display='none';
  document.getElementById('amtCard').style.display='none';
  document.getElementById('noteIn').value='';
  document.getElementById('colAlert').innerHTML='';
  amtStr='0';selLoan=null;
  btn.disabled=false;btn.innerHTML='✓ Record Collection';
  renderAll();
}

// ── LOG ───────────────────────────────────────────
function renderLog(){
  const tc=todCols().slice().reverse();
  const tot=tc.reduce((s,c)=>s+Number(c.amount),0);
  let h='';
  if(tc.length){
    h+=`<div class="log-total">
      <div><div class="lt-l">Total Today</div><div class="lt-v">${fmt(tot)}</div></div>
      <div style="text-align:right"><div class="lt-l">Clients</div><div class="lt-v" style="color:var(--ink)">${tc.length}</div></div>
    </div>`;
    h+=tc.map(c=>`<div class="log-item">
      <div class="li-ic">💰</div>
      <div class="li-info">
        <div class="li-name">${c.customer}</div>
        <div class="li-meta">${c.invoice} · ${c.time}${c.note?' · '+c.note:''}</div>
      </div>
      <div class="li-amt">+${fmt(c.amount)}</div>
    </div>`).join('');
  }else{
    h=`<div class="empty"><div class="empty-ic">📋</div><div class="empty-t">No collections yet</div><div class="empty-s">Go to Collect to get started</div></div>`;
  }
  document.getElementById('logContent').innerHTML=h;
}

function renderPending(){
  const active=loans.filter(l=>l.status==='Active').sort((a,b)=>Number(a.daysRemaining)-Number(b.daysRemaining));

  h+=active.map(l=>{
    const done=paidToday.has(String(l.id));
    const d=Number(l.daysRemaining);
    const tagCls=d<=0?'tag-ov':d<=7?'tag-warn':'tag-ok';
    const tagTxt=d<=0?'OVERDUE':d+' days left';
    return`<div class="pend-item" onclick="quickGo(${l.id})" style="${done?'opacity:.55':''}">
      <div class="pi-l">
        <div class="pi-name">${done?'✓ ':''}<span style="${done?'text-decoration:line-through;color:var(--muted)':''}">${l.customer}</span></div>
        <div class="pi-inv">${l.invoice} · Paid ${l.paidDays}/60 days</div>
        ${done?'<div class="done-stamp">✓ Collected today</div>':''}
      </div>
      <div class="pi-r">
        <div class="pi-bal">${fmt(l.balance)}</div>
        <div class="pi-tag ${tagCls}">${tagTxt}</div>
      </div>
    </div>`;}).join('');
  document.getElementById('pendContent').innerHTML=h;
}

function quickGo(id){
  showPage(0);
  setTimeout(()=>{
    const sel=document.getElementById('clientSel');
    sel.value=id; pickClient();
    document.getElementById('content').scrollTo({top:0,behavior:'smooth'});
  },80);
}

// ── PROFILE ───────────────────────────────────────
function renderProfile(){
  const mc=myCols(), tc=todCols();
  const totAll=mc.reduce((s,c)=>s+Number(c.amount),0);
  const totTod=tc.reduce((s,c)=>s+Number(c.amount),0);
  const url=getUrl();
  document.getElementById('profContent').innerHTML=`
    <div class="prof-banner">
      <div class="prof-av">${me[0]}</div>
      <div class="prof-name">${me}</div>
      <div class="prof-role">Collector · LK Finance Pro</div>
      <div class="prof-stats">
        <div class="ps-box"><div class="ps-v">${fmt(totTod)}</div><div class="ps-l">Today</div></div>
        <div class="ps-box"><div class="ps-v">${fmt(totAll)}</div><div class="ps-l">All Time</div></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-row"><span class="ir-l">Name</span><span class="ir-v">${me}</span></div>
      <div class="info-row"><span class="ir-l">Today's Clients</span><span class="ir-v">${tc.length}</span></div>
      <div class="info-row"><span class="ir-l">Google Sheets</span><span class="ir-v" style="color:${url?'var(--green)':'var(--red)'}">${url?'✓ Connected':'⚠ Not set'}</span></div>
    </div>
    <div class="url-card">
      <label>Google Sheets URL (paste once)</label>
      <input class="url-inp" type="url" id="urlFld" placeholder="https://script.google.com/macros/s/.../exec" value="${url}">
      <button class="btn-save-url" onclick="saveUrl()">Save & Connect</button>
    </div>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>`;
}

function saveUrl(){
  const url=document.getElementById('urlFld').value.trim();
  localStorage.setItem('lkf_url',url);
  showToast('✓ URL saved!','g');
  syncData().then(()=>renderAll());
}

// ── PAGES ─────────────────────────────────────────
const PAGES=['pgCollect','pgLog','pgPending','pgProfile'];
function showPage(i){
  PAGES.forEach((p,j)=>{
    document.getElementById(p).classList.toggle('on',i===j);
    document.getElementById('bn'+j).classList.toggle('on',i===j);
  });
  document.getElementById('content').scrollTo({top:0});
  if(i===1)renderLog();
  if(i===2)renderPending();
  if(i===3)renderProfile();
}

// ── TOAST ─────────────────────────────────────────
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
