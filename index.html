<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bhavi MC">
<meta name="theme-color" content="#0f172a">
<title>Bhavi Micro Credit · Collector</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0f172a;--muted:#64748b;--faint:#94a3b8;--border:#e2e8f0;
  --s2:#f8fafc;--s3:#f1f5f9;
  --blue:#1d4ed8;--bluel:#dbeafe;--blued:#1e3a8a;
  --green:#16a34a;--greenl:#dcfce7;--red:#dc2626;--redl:#fee2e2;
  --amber:#d97706;--amberl:#fef3c7;
}
html,body{height:100%;background:#f1f5f9;font-family:'Inter',sans-serif;font-size:15px;color:var(--ink);overflow:hidden}
.screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.screen.active{display:flex}
/* LOGIN */
#sLogin{background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 60%,#1d4ed8 100%);align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.lcard{background:#fff;border-radius:24px;padding:32px 26px;width:100%;max-width:380px;box-shadow:0 20px 40px rgba(0,0,0,.3)}
.app-ic{width:68px;height:68px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:20px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 20px rgba(29,78,216,.4)}
.login-brand{font-size:22px;font-weight:800;text-align:center;letter-spacing:-.5px}
.login-brand span{color:var(--blue)}
.login-sub{color:var(--muted);font-size:12px;text-align:center;margin-bottom:24px;margin-top:4px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.field{margin-bottom:14px}
.sel-w{position:relative}
.sel-w::after{content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.sel-w select,.field input[type=password]{width:100%;padding:13px 15px;border:2px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none}
.sel-w select:focus,.field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}
.btn-sign{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(29,78,216,.35);margin-top:4px}
.btn-sign:active{transform:scale(.98)}
.err{background:var(--redl);color:var(--red);padding:10px 13px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:12px;display:none}
/* TOPBAR */
.topbar{background:#0f172a;color:#fff;padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-photo{width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3);background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;overflow:hidden;flex-shrink:0}
.tb-photo img{width:100%;height:100%;object-fit:cover}
.tb-name{font-weight:700;font-size:15px}
.tb-role{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.sync-p{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.sp-ok{background:rgba(22,163,74,.25);color:#86efac}
.sp-ing{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
.sp-err{background:rgba(220,38,38,.25);color:#fca5a5}
/* WARNING ALERT */
.warn-alert{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff;padding:10px 14px;font-size:12px;font-weight:600;text-align:center;flex-shrink:0}
/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px}
/* BOTTOM NAV */
.bnav{display:flex;background:#fff;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 10px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--faint);gap:3px}
.bn.on{color:var(--blue)}
.bn-ic{font-size:20px;line-height:1}
.bn-lb{font-size:10px;font-weight:600;letter-spacing:.3px}
.page{display:none}.page.on{display:block}
/* TODAY BANNER */
.today-banner{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);border-radius:16px;padding:18px;color:#fff;margin-bottom:14px}
.tb-date{font-size:12px;opacity:.65;margin-bottom:10px;font-weight:500}
.tb-stats{display:grid;grid-template-columns:1fr 1fr;gap:0}
.tb-s .v{font-size:26px;font-weight:800;line-height:1}
.tb-s .l{font-size:11px;opacity:.65;margin-top:3px}
/* CARDS */
.card{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden}
.card-hd{padding:13px 14px 0;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.card-bd{padding:14px}
.cli-w{position:relative}
.cli-w::after{content:"▾";position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:17px}
.cli-sel{width:100%;padding:13px 36px 13px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;color:var(--ink);background:#fff;-webkit-appearance:none;font-weight:500}
.cli-sel:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}
.cdet{background:var(--s2);border-radius:12px;padding:13px;margin-top:11px;display:none;border:1px solid var(--border)}
.cdr{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.cdr-l{font-size:13px;color:var(--muted)}
.cdr-v{font-size:14px;font-weight:700}
.cdr-v.red{color:var(--red)}.cdr-v.blue{color:var(--blue)}.cdr-v.amber{color:var(--amber)}
/* AMOUNT */
.amt-sec{text-align:center;padding:16px 0 12px}
.amt-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.amt-big{font-size:50px;font-weight:800;color:var(--ink);letter-spacing:-3px;line-height:1;display:flex;align-items:flex-start;justify-content:center;gap:5px}
.amt-cur{font-size:17px;font-weight:700;color:var(--muted);margin-top:9px;letter-spacing:0}
/* NUMPAD */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:12px}
.np{border:2px solid var(--border);border-radius:13px;padding:14px;font-size:23px;font-weight:700;background:#fff;cursor:pointer;font-family:inherit;color:var(--ink);user-select:none;text-align:center;transition:.1s}
.np:active{background:var(--s3);border-color:var(--blue);transform:scale(.95)}
.np.act{font-size:15px;background:var(--s2);color:var(--muted);font-weight:600}
.note-i{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:11px;font-size:15px;font-family:inherit;color:var(--ink);margin-bottom:12px}
.note-i:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluel)}
.btn-col{width:100%;padding:17px;background:var(--green);color:#fff;border:none;border-radius:13px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(22,163,74,.4)}
.btn-col:active{transform:scale(.97)}
.btn-col:disabled{opacity:.5;cursor:not-allowed}
/* LOG */
.log-tot{background:#fff;border-radius:13px;padding:14px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.lt-v{font-size:24px;font-weight:800;color:var(--green)}
.lt-l{font-size:11px;color:var(--muted);margin-top:2px}
.li{background:#fff;border-radius:13px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.li-ic{width:42px;height:42px;border-radius:11px;background:var(--greenl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-meta{font-size:11px;color:var(--muted);margin-top:2px}
.li-amt{font-size:18px;font-weight:800;color:var(--green);white-space:nowrap}
/* PENDING */
.pend-it{background:#fff;border-radius:13px;padding:13px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.pend-it:active{transform:scale(.99);background:var(--s2)}
.pi-l{flex:1;min-width:0}
.pi-name{font-weight:700;font-size:14px}
.pi-inv{font-size:11px;color:var(--muted);margin-top:2px}
.pi-due{font-size:11px;margin-top:2px;font-weight:600}
.pi-r{text-align:right;margin-left:12px;flex-shrink:0}
.pi-bal{font-size:17px;font-weight:800;color:var(--red)}
.pi-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:9px;margin-top:3px;display:inline-block}
.tag-ov{background:var(--redl);color:var(--red)}
.tag-warn{background:var(--amberl);color:var(--amber)}
.tag-ok{background:var(--greenl);color:var(--green)}
.tag-bl{background:#1e293b;color:#f1f5f9}
.done-st{font-size:11px;color:var(--green);font-weight:700;margin-top:2px}
/* PROFILE */
.prof-banner{background:linear-gradient(135deg,#1e3a8a,#7c3aed);border-radius:16px;padding:22px;color:#fff;text-align:center;margin-bottom:12px}
.prof-photo{width:80px;height:80px;border-radius:50%;margin:0 auto 12px;border:3px solid rgba(255,255,255,.35);overflow:hidden;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800}
.prof-photo img{width:100%;height:100%;object-fit:cover}
.prof-name{font-size:22px;font-weight:800}
.prof-role{font-size:13px;opacity:.65;margin-top:3px}
.prof-stats{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:16px}
.ps-box{background:rgba(255,255,255,.15);border-radius:11px;padding:13px;text-align:center}
.ps-v{font-size:19px;font-weight:800}.ps-l{font-size:10px;opacity:.65;margin-top:2px}
.info-card{background:#fff;border-radius:13px;padding:4px 14px;margin-bottom:10px;border:1px solid var(--border)}
.ir{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--s3)}
.ir:last-child{border-bottom:none}
.ir-l{font-size:14px;color:var(--muted)}
.ir-v{font-size:14px;font-weight:700}
.photo-upload{background:#fff;border-radius:13px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.photo-upload label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px}
.photo-upload input[type=file]{width:100%;font-size:13px}
.btn-so{width:100%;padding:14px;background:var(--redl);color:var(--red);border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
/* TOAST */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(16px);background:#0f172a;color:#fff;padding:11px 22px;border-radius:28px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.g{background:var(--green)}.toast.r{background:var(--red)}.toast.o{background:var(--amber)}
.empty{text-align:center;padding:44px 20px;color:var(--faint)}
.empty-ic{font-size:48px;margin-bottom:12px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    <button class="btn-sign" onclick="login()">Sign In →</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="screen" id="sApp">

    <span class="sync-p sp-ing" id="syncP">⟳ Sync</span>

  <div id="warnAlert" style="display:none" class="warn-alert"></div>

  <div class="content" id="content">

        </div>
      </div>
      <div class="card" id="amtCard" style="display:none">
        <div class="card-bd">
          <div class="amt-sec">

            <div class="amt-big"><span class="amt-cur">LKR</span><span id="amtDisp">0</span></div>
          </div>
          <div class="numpad" id="numpad"></div>
          <input class="note-i" id="noteIn" placeholder="Note (optional)">
          <div id="colAlert" style="margin-bottom:10px"></div>
          <button class="btn-col" id="colBtn" onclick="collect()">✓ Record Collection</button>
        </div>
      </div>
    </div>

    <div class="page" id="pgLog"><div id="logContent"></div></div>
    <div class="page" id="pgPending"><div id="pendContent"></div></div>
    <div class="page" id="pgProfile"><div id="profContent"></div></div>
  </div>

  <nav class="bnav">
    <button class="bn on" id="bn0" onclick="showPage(0)"><span class="bn-ic">💳</span><span class="bn-lb">Collect</span></button>
    <button class="bn"    id="bn1" onclick="showPage(1)"><span class="bn-ic">📋</span><span class="bn-lb">Today</span></button>
    <button class="bn"    id="bn2" onclick="showPage(2)"><span class="bn-ic">⏳</span><span class="bn-lb">Pending</span></button>
    <button class="bn"    id="bn3" onclick="showPage(3)"><span class="bn-ic">👤</span><span class="bn-lb">Me</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

let me=null, loans=[], allCols=[], amtStr='0', selLoan=null;

const fmt=n=>'LKR '+Math.round(n).toLocaleString();
const tod=()=>new Date().toISOString().split('T')[0];
function saveL(){localStorage.setItem('bmc_loans',JSON.stringify(loans));localStorage.setItem('bmc_all_cols',JSON.stringify(allCols))}
function getUrl(){return localStorage.getItem('bmc_url')||''}
function myCols(){return allCols.filter(c=>c.collector===me)}
function todCols(){return myCols().filter(c=>String(c.date).startsWith(tod()))}
function getPhoto(){return localStorage.getItem('bmc_photo_'+me)||''}

// Recalc days past due from actual due date
function recalc(ls){
  const today=new Date(); today.setHours(0,0,0,0);
  ls.forEach(l=>{
    if(l.dueDate&&l.status==='Active'){
      const due=new Date(l.dueDate); due.setHours(0,0,0,0);
      l.daysPastDue=Math.floor((today-due)/86400000);
    }else l.daysPastDue=l.daysPastDue||0;
  });
  return ls;
}

// ── AUTH ─────────────────────────────────────────
function login(){
  const name=document.getElementById('nameSelect').value;
  const pass=document.getElementById('passIn').value;
  const err=document.getElementById('errBox');
  err.style.display='none';
  if(!name){err.textContent='Please select your name.';err.style.display='block';return}
  if(pass!==PW[name]){err.style.display='block';return}
  me=name;
  loans=recalc(JSON.parse(localStorage.getItem('bmc_loans')||'null')||JSON.parse(JSON.stringify(SEED)));
  allCols=JSON.parse(localStorage.getItem('bmc_all_cols')||'[]');
  document.getElementById('tbName').textContent=name;
  document.getElementById('tbRole').textContent=ROLES[name]||'Collector';
  renderPhoto('tbPhoto');
  document.getElementById('sLogin').classList.remove('active');
  document.getElementById('sApp').classList.add('active');
  buildNumpad();
  syncData().then(()=>renderAll());
  // Auto-refresh every 60s
  setInterval(()=>syncData().then(()=>renderAll()),60000);
}

function signOut(){
  me=null;
  document.getElementById('sApp').classList.remove('active');
  document.getElementById('sLogin').classList.add('active');
  document.getElementById('passIn').value='';
  document.getElementById('nameSelect').value='';
}

function renderPhoto(elId){
  const el=document.getElementById(elId);
  const photo=getPhoto();
  if(photo){
    el.innerHTML=`<img src="${photo}" alt="${me}">`;
  }else{
    el.textContent=me?me[0]:'?';
    el.style.background='linear-gradient(135deg,#1d4ed8,#7c3aed)';
    el.style.color='#fff';
    el.style.display='flex';el.style.alignItems='center';el.style.justifyContent='center';
  }
}

// ── SYNC ─────────────────────────────────────────
function setSP(st,msg){
  const el=document.getElementById('syncP');
  el.className='sync-p '+(st==='ok'?'sp-ok':st==='err'?'sp-err':'sp-ing');
  el.textContent=msg;
}
async function apiFetch(a){const u=getUrl();if(!u)return null;try{const r=await fetch(u+'?action='+a);return await r.json()}catch{return null}}
async function apiPost(a,d){const u=getUrl();if(!u)return null;try{const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:a,data:d})});return await r.json()}catch{return null}}
async function syncData(){
  if(!getUrl()){setSP('err','⚠ Offline');return}
  setSP('ing','⟳ Sync');
  const[lr,cr]=await Promise.all([apiFetch('getLoans'),apiFetch('getCollections')]);
  if(lr?.loans?.length){loans=recalc(lr.loans);localStorage.setItem('bmc_loans',JSON.stringify(loans))}
  if(cr?.collections){allCols=cr.collections;localStorage.setItem('bmc_all_cols',JSON.stringify(allCols))}
  setSP('ok','✓ Live');
}

// ── RENDER ALL ────────────────────────────────────
function renderAll(){
  renderBanner(); buildCliSelect(); renderLog(); renderPending(); renderProfile();
  checkWarnings();
}

function checkWarnings(){
  const active=loans.filter(l=>l.status==='Active');
  const bl30=active.filter(l=>(l.daysPastDue||0)>=30);
  const w20=active.filter(l=>(l.daysPastDue||0)>=20&&(l.daysPastDue||0)<30);
  const w10=active.filter(l=>(l.daysPastDue||0)>=10&&(l.daysPastDue||0)<20);
  const wa=document.getElementById('warnAlert');
  if(bl30.length||w20.length||w10.length){
    wa.style.display='block';
    wa.textContent=`⛔ ${bl30.length} Blacklisted · 🔴 ${w20.length} Final Warning · ⚠️ ${w10.length} Warning — Check Pending tab`;
  }else wa.style.display='none';
}

function renderBanner(){
  const tc=todCols(), tot=tc.reduce((s,c)=>s+Number(c.amount),0);
  const d=new Date();
  document.getElementById('todayBanner').innerHTML=`
    <div class="tb-date">${d.toLocaleDateString('en-LK',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    <div class="tb-stats">
      <div class="tb-s"><div class="v">LKR ${Math.round(tot).toLocaleString()}</div><div class="l">Collected Today</div></div>
      <div class="tb-s"><div class="v">${tc.length}</div><div class="l">Clients Paid</div></div>
    </div>`;
}

function buildCliSelect(){
  const active=loans.filter(l=>l.status==='Active').sort((a,b)=>String(a.customer).localeCompare(String(b.customer)));
  const sel=document.getElementById('cliSel');
  sel.innerHTML='<option value="">Choose a client...</option>'+
    active.map(l=>`<option value="${l.id}">${l.customer}  ·  Bal: ${fmt(l.balance)}</option>`).join('');
}

function pickCli(){
  const id=parseInt(document.getElementById('cliSel').value);
  const det=document.getElementById('cdet'), ac=document.getElementById('amtCard');
  if(!id){det.style.display='none';ac.style.display='none';selLoan=null;return}
  selLoan=loans.find(l=>l.id==id); if(!selLoan)return;
  const dpd=selLoan.daysPastDue||0;
  document.getElementById('cd-bal').textContent=fmt(selLoan.balance);
  document.getElementById('cd-daily').textContent=fmt(Number(selLoan.totalWithInterest)/60)+'/day';
  document.getElementById('cd-inv').textContent=selLoan.invoice;
  document.getElementById('cd-due').textContent=selLoan.dueDate||'—';
  document.getElementById('cd-dpd').textContent=dpd>0?'+'+dpd+' days overdue':'On time';
  document.getElementById('cd-dpd').className='cdr-v '+(dpd>=30?'red':dpd>0?'amber':'blue');
  det.style.display='block'; ac.style.display='block';
  amtStr=String(Math.round(Number(selLoan.totalWithInterest)/60)); updAmt();
  document.getElementById('colAlert').innerHTML='';
}

function buildNumpad(){
  const np=document.getElementById('numpad');
  np.innerHTML=['1','2','3','4','5','6','7','8','9','⌫','0','✓'].map(k=>
    `<button class="np${(k==='⌫'||k==='✓')?' act':''}" onclick="npTap('${k}')">${k}</button>`).join('');
}
function npTap(k){if(k==='✓'){collect();return}if(k==='⌫'){amtStr=amtStr.length>1?amtStr.slice(0,-1):'0'}else{amtStr=amtStr==='0'?k:amtStr+k}updAmt()}
function updAmt(){document.getElementById('amtDisp').textContent=Number(amtStr).toLocaleString()}

// ── COLLECT ─────────────────────────────────────
async function collect(){
  const amt=parseFloat(amtStr), btn=document.getElementById('colBtn');
  if(!selLoan){showToast('Select a client','r');return}
  if(!amt||amt<=0){showToast('Enter amount','r');return}
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Saving...';
  const now=new Date(), time=now.toLocaleTimeString('en-LK',{hour:'2-digit',minute:'2-digit'});
  const note=document.getElementById('noteIn').value.trim();
  selLoan.totalPaid=Number(selLoan.totalPaid)+amt;
  selLoan.balance=Math.max(0,Number(selLoan.balance)-amt);
  selLoan.paidDays=Math.min(60,Math.floor(Number(selLoan.totalPaid)/(Number(selLoan.totalWithInterest)/60)));
  if(selLoan.balance<=0){selLoan.status='Closed';selLoan.balance=0}
  const col={id:Date.now(),date:tod(),time,collector:me,loanId:selLoan.id,
    customer:selLoan.customer,invoice:selLoan.invoice,amount:amt,note,balance:selLoan.balance};
  allCols.push(col); saveL();
  setSP('ing','⟳ Saving');
  const[r1,r2]=await Promise.all([apiPost('addCollection',col),apiPost('updateLoan',selLoan)]);
  const ok=r1&&r1.ok;
  setSP(ok?'ok':'err',ok?'✓ Saved':'⚠ Offline');
  showToast(ok?`✓ Saved! ${fmt(amt)} from ${selLoan.customer}`:`✓ Saved locally`,'g');
  document.getElementById('cliSel').value='';
  document.getElementById('cdet').style.display='none';
  document.getElementById('amtCard').style.display='none';
  document.getElementById('noteIn').value='';
  document.getElementById('colAlert').innerHTML='';
  amtStr='0'; selLoan=null;
  btn.disabled=false; btn.innerHTML='✓ Record Collection';
  renderAll();
}

// ── LOG ──────────────────────────────────────────
function renderLog(){
  const tc=todCols().slice().reverse();
  const tot=tc.reduce((s,c)=>s+Number(c.amount),0);
  let h='';
  if(tc.length){
    h+=`<div class="log-tot"><div><div class="lt-l">Total Today</div><div class="lt-v">${fmt(tot)}</div></div><div style="text-align:right"><div class="lt-l">Clients</div><div class="lt-v" style="color:var(--ink)">${tc.length}</div></div></div>`;
    h+=tc.map(c=>`<div class="li"><div class="li-ic">💰</div><div class="li-info"><div class="li-name">${c.customer}</div><div class="li-meta">${c.invoice} · ${c.time}${c.note?' · '+c.note:''}</div></div><div class="li-amt">+${fmt(c.amount)}</div></div>`).join('');
  }else{
    h='<div class="empty"><div class="empty-ic">📋</div><div style="font-weight:600;color:var(--muted)">No collections yet today</div></div>';
  }
  document.getElementById('logContent').innerHTML=h;
}

// ── PENDING ──────────────────────────────────────
function renderPending(){
  const active=loans.filter(l=>l.status==='Active').sort((a,b)=>(b.daysPastDue||0)-(a.daysPastDue||0));
  const paid=new Set(todCols().map(c=>String(c.loanId)));
  let h=`<div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:10px">${active.length} active loans — worst overdue first · tap to collect</div>`;
  h+=active.map(l=>{
    const done=paid.has(String(l.id));
    const dpd=l.daysPastDue||0;
    // Warning level tag
    const tagCls=dpd>=30?'tag-bl':dpd>=20?'tag-ov':dpd>=10?'tag-warn':dpd>0?'tag-ov':'tag-ok';
    const tagTxt=dpd>=30?'⛔ BLACKLIST':dpd>=20?'🔴 FINAL WARN':dpd>=10?'⚠️ WARN':dpd>0?'+'+dpd+'d overdue':'On time';
    // Days info
    const dueInfo=dpd>0?`+${dpd} days past due`:(dpd===0?'Due today':'Due '+l.dueDate);
    return`<div class="pend-it" onclick="${done?'':('quickGo('+l.id+')')}" style="${done?'opacity:.55':''}">
      <div class="pi-l">
        <div class="pi-name">${done?'✓ ':''}<span style="${done?'text-decoration:line-through;color:var(--muted)':''}">${l.customer}</span></div>
        <div class="pi-inv">${l.invoice} · Paid ${l.paidDays}/60 days</div>
        <div class="pi-due" style="color:${dpd>0?'var(--red)':'var(--muted)'}">${dueInfo}</div>
        ${done?'<div class="done-st">✓ Collected today</div>':''}
      </div>
      <div class="pi-r">
        <div class="pi-bal">${fmt(l.balance)}</div>
        <div class="pi-tag ${tagCls}">${tagTxt}</div>
      </div>
    </div>`;}).join('');
  document.getElementById('pendContent').innerHTML=h;
}

function quickGo(id){
  showPage(0);
  setTimeout(()=>{
    const sel=document.getElementById('cliSel'); sel.value=id; pickCli();
    document.getElementById('content').scrollTo({top:0,behavior:'smooth'});
  },80);
}

// ── PROFILE ──────────────────────────────────────
function renderProfile(){
  const mc=myCols(), tc=todCols();
  const totAll=mc.reduce((s,c)=>s+Number(c.amount),0);
  const totTod=tc.reduce((s,c)=>s+Number(c.amount),0);
  const photo=getPhoto();
  document.getElementById('profContent').innerHTML=`
    <div class="prof-banner">
      <div class="prof-photo" id="profPhoto">${photo?`<img src="${photo}" alt="${me}">`:(me?me[0]:'?')}</div>
      <div class="prof-name">${me}</div>
      <div class="prof-role">${ROLES[me]||'Collector'} · Bhavi Micro Credit</div>
      <div class="prof-stats">
        <div class="ps-box"><div class="ps-v">${fmt(totTod)}</div><div class="ps-l">Today</div></div>
        <div class="ps-box"><div class="ps-v">${fmt(totAll)}</div><div class="ps-l">All Time</div></div>
      </div>
    </div>
    <div class="photo-upload">
      <label>📸 Update Profile Photo</label>
      <input type="file" accept="image/*" onchange="uploadPhoto(this)">
    </div>
    <div class="info-card">
      <div class="ir"><span class="ir-l">Name</span><span class="ir-v">${me}</span></div>
      <div class="ir"><span class="ir-l">Role</span><span class="ir-v">${ROLES[me]||'Collector'}</span></div>
      <div class="ir"><span class="ir-l">Today's Clients</span><span class="ir-v">${tc.length}</span></div>
      <div class="ir"><span class="ir-l">Google Sheets</span><span class="ir-v" style="color:${getUrl()?'var(--green)':'var(--red)'}">${getUrl()?'✓ Connected':'⚠ Not set'}</span></div>
    </div>
    <button class="btn-so" onclick="signOut()">Sign Out</button>`;
}

function uploadPhoto(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    localStorage.setItem('bmc_photo_'+me, e.target.result);
    renderPhoto('tbPhoto');
    renderProfile();
    showToast('✓ Photo updated','g');
  };
  reader.readAsDataURL(file);
}

// ── PAGES ────────────────────────────────────────
const PAGES=['pgCollect','pgLog','pgPending','pgProfile'];
function showPage(i){
  PAGES.forEach((p,j)=>{document.getElementById(p).classList.toggle('on',i===j);document.getElementById('bn'+j).classList.toggle('on',i===j)});
  document.getElementById('content').scrollTo({top:0});
  if(i===1)renderLog(); if(i===2)renderPending(); if(i===3)renderProfile();
}

function showToast(msg,type){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.className='toast '+(type||''); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
